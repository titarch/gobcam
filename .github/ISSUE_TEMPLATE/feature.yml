name: Feature request
description: Suggest a new capability or enhancement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: skim the [roadmap](../../docs/roadmap.md).
        If the idea is already listed, add context there instead of
        opening a duplicate issue.

  - type: textarea
    id: motivation
    attributes:
      label: What problem are you trying to solve?
      description: The user-facing pain or workflow that prompted the request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: A rough sketch of the feature — UI, CLI, IPC surface, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they aren't enough.
    validations:
      required: false
