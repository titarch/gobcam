# Release pipeline. Lives at .github/workflows/ rather than
# .gitea/workflows/ so it works unchanged on Gitea Actions (today)
# and GitHub Actions (future): Gitea reads workflows from both.
#
# Two ways to trigger:
#  - push a tag `v*.*.*` → real release (artifacts + auto-generated
#    notes attached to a Gitea/GitHub release tied to the tag).
#  - manual `workflow_dispatch` → "dry-run": same build, but the
#    .deb/.AppImage land as workflow artifacts (downloadable from
#    the run page) instead of as a release. Useful for rehearsing
#    the pipeline without burning a tag/version. Skips the version-
#    matches-tag check since there's no tag.

name: release
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Pinned just version for the inline install. Bump together with
# the toolchain when we update the local just (rust-toolchain.toml
# governs Rust; this only affects the runner). Avoids the
# `extractions/setup-just@v2` action which queries api.github.com
# with the workflow's `github.token` — on Gitea that token is a
# Gitea token, not a GitHub one, so the API call returns
# "Bad credentials".
env:
  JUST_VERSION: 1.50.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the release

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history → richer auto-generated release notes
          # (commits since the previous tag).
          fetch-depth: 0

      - name: Verify tag matches Cargo.toml version
        if: ${{ github.event_name == 'push' }}
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::tag $tag does not match Cargo.toml $cargo_version"
            exit 1
          fi
          echo "tag $tag matches Cargo.toml — proceeding"

      - name: Install just
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL \
            "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" just
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/just" --version

      - name: Build .deb + AppImage
        # `docker-package-ci` rather than `docker-package`: the
        # latter does `docker run -v $PWD:/workspace`, which fails
        # in DinD-based runners because the workspace is a Docker
        # volume the daemon can't resolve as a bind-mount source.
        # The CI variant uses `--volumes-from "$HOSTNAME"` to
        # inherit the existing volume — works identically locally
        # and on the runner, no path translation needed.
        run: just docker-package-ci

      - name: Generate release notes
        if: ${{ github.event_name == 'push' }}
        run: |
          # Build the release body in two parts:
          #   1. Auto-generated changelog from git log between the
          #      previous tag and this one (placeholder on first tag).
          #   2. Static install instructions from .github/release-body.md
          #      — keeps the `chmod +x` reminder for AppImage in front
          #      of every reader since browsers strip the exec bit on
          #      download regardless of what we ship.
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          {
            if [ -n "$prev" ]; then
              printf "## Changes since %s\n\n" "$prev"
              git log --pretty=format:'- %s (%h)' "$prev..HEAD"
              printf "\n\n"
            else
              printf "Initial release.\n\n"
            fi
            cat .github/release-body.md
          } > release-notes.md
          cat release-notes.md

      - name: Create release (tag push only)
        if: ${{ github.event_name == 'push' }}
        # akkuman/gitea-release-action talks to Gitea's release API
        # directly — softprops/action-gh-release@v2 used a PATCH
        # endpoint Gitea returns 405 on. `sha256sum: true` publishes
        # a `.sha256` sidecar next to each uploaded asset, which is
        # the more conventional shape than the single SHA256SUMS
        # file we used to compute by hand.
        uses: akkuman/gitea-release-action@v1
        env:
          NODE_OPTIONS: '--experimental-fetch'
        with:
          files: |
            target/release/bundle/deb/Gobcam_*.deb
            target/release/bundle/appimage/Gobcam_*.AppImage
          body_path: release-notes.md
          sha256sum: true

      - name: Upload as workflow artifacts (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        # Pinned to v3: v4+ requires the @actions/artifact v2 API
        # which Gitea Actions doesn't implement (Gitea identifies as
        # GHES, so v4 fails with `GHESNotSupportedError`). v3 uses
        # the older v1 protocol that Gitea does support.
        uses: actions/upload-artifact@v3
        with:
          name: gobcam-bundles-${{ github.run_id }}
          path: |
            target/release/bundle/deb/Gobcam_*.deb
            target/release/bundle/appimage/Gobcam_*.AppImage
          if-no-files-found: error
          retention-days: 14
