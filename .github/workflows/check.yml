# Contributor gate. Gitea reads workflows from .github/workflows/,
# so this file is shared by GitHub Actions and Gitea Actions.

name: check
on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:

env:
  JUST_VERSION: 1.50.0

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install just
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL \
            "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" just
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/just" --version

      - name: Run checks (GitHub)
        if: ${{ github.server_url == 'https://github.com' }}
        run: just docker-check

      - name: Run checks (Gitea)
        if: ${{ github.server_url != 'https://github.com' }}
        run: just docker-check-ci
